# ──────────────────────────────────────────────────────────────
#  Radar de Risco — Configuração
#  Uso:  python risk_dashboard.py --config config_risco.yaml
#  Demo: python risk_dashboard.py --config config_risco.yaml --demo
# ──────────────────────────────────────────────────────────────

dashboard:
  title: "Radar de Risco — Emissores"
  language: "pt-BR"
  country: "BR"
  period: "7d"                 # Janela de busca no Google News: 1d | 7d | 30d
  windows: [7, 30, 90, 365]    # Janelas selecionáveis no dashboard
  default_window: 7            # Janela exibida ao abrir
  attention_max_window: 30     # Selo "ATENÇÃO IMEDIATA" só em janelas curtas (score não é comparável em janelas longas)
  history_keep_days: 400       # Retenção do histórico (>= maior janela)
  max_articles_per_query: 15
  restrict_to_sources: false
  sources:
    - "valor.globo.com"
    - "infomoney.com.br"
    - "braziljournal.com"
    - "neofeed.com.br"
    - "exame.com"
    - "estadao.com.br"
    - "folha.uol.com.br"
    - "moneytimes.com.br"
    - "reuters.com"
    - "bloomberg.com"
    - "bloomberglinea.com.br"
    - "pipelinevalor.globo.com"

# ── Tiers de monitoramento ────────────────────────────────────
# fetch_every_n_runs: 1 = busca em toda execução (tempo quase-real com o
# workflow 4x/dia) · 2 = busca em execuções alternadas · 0 = não busca,
# a menos que o emissor tenha force_fetch: true (Tier 3 sob demanda).
tiers:
  1: { label: "Tier 1", fetch_every_n_runs: 1 }
  2: { label: "Tier 2", fetch_every_n_runs: 2 }
  3: { label: "Tier 3", fetch_every_n_runs: 0 }

# ── Watchlist de emissores ────────────────────────────────────
# Hierarquia de fontes oficiais por emissor (bloco "official"):
#   1. official.rss  → RSS de comunicados do RI (melhor: estruturado, rápido)
#   2. official.news → página estática de notícias do RI (scraping best-effort;
#      NÃO funciona em sites 100% JavaScript — nesses casos use rss ou confie na CVM)
#   3. CVM/IPE       → fatos relevantes (automático p/ toda listada; cvm: true documenta)
#   4. Imprensa      → Google News (sempre ativo)
# Tudo que vem de rss/news entra com confiança "oficial" (1.0) e atribuição forçada.
# ATENÇÃO: as URLs "ri:" abaixo são informacionais e as mais conhecidas — valide
# antes de preencher rss/news (só rss/news disparam coleta).
# aliases: nome + variações + TODOS os tickers (matching por palavra inteira,
# sem acento/caixa). tier: nível de monitoramento.
