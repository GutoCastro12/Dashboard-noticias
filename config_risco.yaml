ri_scraper:
  use_browser: true          # habilita o degrau 4 (headless) quando 1-3 falham
  browser_timeout_s: 35
  min_items: 3               # menos que isso → tenta a próxima estratégia
  # Resiliência: se a URL de official.news quebrar ou render pouco (sites de
  # RI mudam de caminho ao trocar de fornecedor — MZ, RIWeb, Ten Meetings…),
  # o crawler volta à home do RI (official.ri) e localiza sozinho a seção
  # cujo caminho contenha um destes termos, nesta ordem de preferência:
  preferred_paths:
    - "fatos-relevantes"
    - "fato-relevante"
    - "comunicados-e-fatos"
    - "comunicados-ao-mercado"
    - "comunicados"
    - "resultados-e-comunicados"
    - "noticias"
    - "avisos"
    - "resultados"

# ── Buscas de mercado (sem empresa específica) ────────────────
market_queries:
  enabled: true
  queries:
    - "recuperação judicial empresa"
    - "pedido de falência empresa"
    - "rebaixamento rating empresa brasileira"
    - "covenant dívida empresa"
    - "CVM suspende negociação"

# ── Taxonomia de eventos, severidade e scoring ────────────────
taxonomy:
  # `applies_to` = grupos de ativos em que o evento faz sentido. Eventos
  # corporativos NÃO se aplicam a Gestoras/Fundos (uma "recuperação judicial"
  # não descreve risco de um veículo); estes têm taxonomia própria, ancorada em
  # SEC Rule 22e-4, ESMA (AIFMD II/UCITS) e IOSCO.
  # Palavras-chave em EN/ES nos eventos materiais são REDE DE SEGURANÇA: se a
