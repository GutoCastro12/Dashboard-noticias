name: Update Risk Dashboard

on:
  schedule:
    - cron: '0 10,13,16,19 * * 1-5'   # 07h, 10h, 13h e 16h BRT, dias úteis
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}   # opcional (llm.enabled)
        run: python risk_dashboard.py --config config_risco.yaml

      - name: Prepare static output for Render
        run: cp dashboard_risco.html index.html

      # Histórico persistido via commit no repositório — não via actions/cache,
      # que evicta entradas não acessadas há 7 dias e tem limite de 10GB/repo.
      - name: Commit history + dashboard
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "Radar de Risco (GitHub Actions)"
          git add risk_history.json dashboard_risco.html index.html
          git diff --cached --quiet || git commit -m "chore(radar): atualização automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
