# ── Scoring semanal (radar) ───────────────────────────────────
scoring:
  attention_threshold: 80
  count_repeated_events: false
  extra_per_article: 5
  extra_cap: 20

# ── Evolução por emissor (radar de longo prazo) ───────────────
# Status:
#   Crítico          → evento com score BRUTO >= critico_event_min_score na
#                      janela (fatos duros como RJ/default não "envelhecem")
#                      OU score acumulado PONDERADO >= critico_total_min
#   Atenção elevada  → score ponderado >= atencao_total_min
#                      OU 2+ tipos de evento negativos distintos
#   Monitorar        → qualquer evento negativo na janela
# Decaimento: o score acumulado usa meia-vida (evento de hoje vale 100%,
# de 30 dias vale 50%, de 60 dias vale 25%) — prioriza deterioração RECENTE.
evolution:
  window_days: 90
  decay:
    enabled: true
    half_life_days: 30
  same_event_window_days: 10  # notícias do mesmo tipo de evento p/ o mesmo emissor
                              # dentro desta janela = 1 sinal corroborado (não N sinais)
  corroboration_bonus: [4, 2, 1]  # bônus por fonte independente ADICIONAL (2ª: +4,
                              # 3ª: +2, 4ª: +1, demais: 0). Republicações confirmam
                              # o evento sem multiplicar o score.
  persistence_alert:          # "N sinais negativos em X dias" — acúmulo importa
    min_signals: 3            # ocorrências negativas (pós-dedup) na janela
    min_types: 2              # de pelo menos N tipos distintos
    days: 45
  status:
    critico_event_min_score: 90   # PISO ABSOLUTO: fatos duros (RJ, default, falência,
                                  # fraude) são Crítico sempre — nunca relativos ao regime
    critico_total_min: 125        # valores BASE: âncora da banda adaptativa + fallback
    atencao_total_min: 60
    # ── Limiares adaptativos de acumulação ──────────────────────
    # Os limiares de score acumulado são recalibrados a cada execução com a
    # distribuição REAL da carteira: amostra = pico semanal do score ponderado
    # por emissor (só emissores ativos) na janela de calibração. "Atenção" e
    # "Crítico" viram percentis dessa distribuição — em ano calmo os limiares
    # caem (evento manso não vira alarme falso... nem passa despercebido);
    # em regime agitado sobem, MAS só dentro da banda: em crise sistêmica o
    # limiar trava no teto e a tela fica vermelha MESMO — crise não é
    # normalizada para fora. Amostra pequena (início) → usa os valores base.
    adaptive:
      enabled: true
      calibration_days: 90
      atencao_percentile: 75      # "Atenção" ≈ quartil superior dos emissores ativos
      critico_percentile: 95      # "Crítico" ≈ top 5% dos emissores ativos
      min_sample: 40              # emissor-semanas ativos mínimos p/ calibrar
      band: [0.6, 1.5]            # limiar efetivo ∈ [0.6×, 1.5×] do valor base

# ── Deduplicação ──────────────────────────────────────────────
# A mesma matéria replicada em vários veículos conta uma vez só.
dedup:
  enabled: true
  similarity: 0.75        # razão de similaridade entre títulos (SequenceMatcher, 0-1)
  token_overlap: 0.50     # OU sobreposição de palavras-chave dos títulos (Jaccard, 0-1)

# ── Fatos relevantes da CVM (dados abertos) ───────────────────
# RJ, waiver, renúncia de auditor e troca de CEO saem primeiro em fato
# relevante, antes da imprensa. Fonte: dados.cvm.gov.br (dataset IPE).
cvm_fatos_relevantes:
  enabled: true
  categories: ["Fato Relevante"]
  lookback_days: 7        # janela de protocolos considerada em cada execução

# ── LLM (opcional) ────────────────────────────────────────────
# consolidate: análise EM LOTE por emissor — o Gemini recebe todas as
# manchetes novas da empresa e, numa única chamada: (1) agrupa manchetes
# que cobrem o MESMO fato (dedup semântico); (2) confirma quais eventos de
# fato ocorreram (descarta especulação/negação/caso requentado); (3)
# verifica se a empresa é protagonista (não assessora/credora/citada de
# passagem). Falha da API = mantém a classificação por keyword (fail-open).
# Artigos já no histórico não são reanalisados.
llm:
  enabled: true              # requer o secret GEMINI_API_KEY no GitHub Actions; sem ele, segue só com keywords
  consolidate: true
  # Desde abr/2026 o free tier da API só tem Flash/Flash-Lite da geração 3;
  # a família 2.5 inteira virou paga (contas novas recebem 404 nela).
  # gemini-3-flash: 10 req/min e 1.500 req/dia grátis.
  model: "gemini-3-flash"
  model_fallbacks: ["gemini-3.1-flash-lite"]   # tentados em ordem se o principal der 404
  rpm_sleep_seconds: 6.5     # respeita o limite de requisições/minuto do free tier
  gemini_api_key: ""         # ou variável de ambiente GEMINI_API_KEY

# ── Saída ─────────────────────────────────────────────────────
output:
  filename: "dashboard_risco.html"
  history_file: "risk_history.json"
  open_browser: false
