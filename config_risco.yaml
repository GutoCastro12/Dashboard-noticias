# ── Buscas de mercado (sem empresa específica) ────────────────
market_queries:
  enabled: true
  queries:
    - "recuperação judicial empresa"
    - "pedido de falência empresa"
    - "rebaixamento rating empresa brasileira"
    - "covenant dívida empresa"
    - "CVM suspende negociação"

# ── Taxonomia de eventos, severidade e scoring ────────────────
taxonomy:
  # 🔴 Crítico — alerta imediato
  - id: recuperacao_judicial
    label: "Recuperação Judicial"
    severity: critico
    score: 100
    keywords: ["recuperação judicial", "recuperacao judicial", "pedido de RJ", "entra com RJ", "chapter 11"]
  - id: default
    label: "Default"
    severity: critico
    score: 100
    keywords: ["default", "calote", "deixa de pagar juros", "não paga debênture", "inadimplência da dívida", "missed payment", "atraso no pagamento de dívida"]
  - id: falencia
    label: "Falência"
    severity: critico
    score: 95
    keywords: ["falência", "falencia", "pedido de falência", "autofalência", "liquidação judicial", "bankruptcy"]
  - id: fraude
    label: "Fraude"
    severity: critico
    score: 90
    keywords: ["fraude", "fraude contábil", "inconsistências contábeis", "manipulação de resultados", "accounting fraud", "rombo contábil"]
  - id: suspensao_negociacao
    label: "Suspensão de negociação"
    severity: critico
    score: 85
    keywords: ["suspensão de negociação", "suspensao de negociacao", "negociação suspensa", "trading halt", "B3 suspende"]
  - id: intervencao_regulatoria
    label: "Intervenção regulatória"
    severity: critico
    score: 85
    keywords: ["intervenção do banco central", "liquidação extrajudicial", "CVM abre processo", "intervenção regulatória", "regime de administração especial"]
  - id: covenant_breach
    label: "Covenant breach"
    severity: critico
    score: 80
    keywords: ["covenant", "quebra de covenant", "waiver", "descumprimento de cláusula financeira"]
  - id: rebaixamento_rating
    label: "Rebaixamento de rating"
    severity: critico
    score: 80
    keywords: ["rebaixamento de rating", "downgrade", "rebaixa rating", "rebaixa nota de crédito", "corta rating", "rebaixada pela S&P", "rebaixada pela Moody's", "rebaixada pela Fitch"]
  - id: renuncia_auditor
    label: "Renúncia do auditor"
    severity: critico
    score: 75
    keywords: ["renúncia do auditor", "auditor renuncia", "auditoria renuncia", "KPMG renuncia", "PwC renuncia", "EY renuncia", "Deloitte renuncia"]

  # 🟠 Alto impacto
  - id: lucro_abaixo_consenso
    label: "Lucro muito abaixo do consenso"
    severity: alto
    score: 45
    keywords: ["lucro abaixo do consenso", "resultado decepciona", "prejuízo surpreende", "abaixo das expectativas", "miss no resultado", "lucro despenca"]
  - id: ma
    label: "M&A"
    severity: alto
    score: 40
    keywords: ["fusão", "aquisição", "M&A", "compra a rival", "incorporação de", "combinação de negócios", "OPA"]
  - id: guidance_negativo
    label: "Guidance negativo"
    severity: alto
    score: 35
    keywords: ["guidance negativo", "reduz guidance", "corta projeção", "revisa projeções para baixo", "reduz estimativa"]
  - id: emissao_divida
    label: "Grande emissão de dívida"
    severity: alto
    score: 35
    keywords: ["emissão de debêntures", "emissão de dívida", "capta R$", "emissão de bonds", "oferta de notas", "emissão bilionária"]
  - id: follow_on
    label: "Follow-on"
    severity: alto
    score: 30
    keywords: ["follow-on", "follow on", "oferta subsequente de ações", "oferta de ações", "aumento de capital"]
  - id: troca_ceo
    label: "Troca de CEO"
    severity: alto
    score: 25
    keywords: ["novo CEO", "troca de CEO", "renúncia do CEO", "deixa o comando da", "assume a presidência da", "CEO deixa"]

  # 🟡 Médio
  - id: outlook_negativo
    label: "Outlook negativo"
    severity: medio
    score: 20
    keywords: ["perspectiva negativa", "outlook rebaixado", "perspectiva rebaixada", "revisa perspectiva para negativa", "perspectiva para negativa"]
  - id: recomendacao_negativa
    label: "Recomendação rebaixada"
    severity: medio
    score: 15
    keywords: ["rebaixa recomendação", "corta preço-alvo", "reduz preço-alvo", "recomendação de venda", "rebaixada para venda", "rebaixada para neutra"]
  - id: mudanca_regulatoria
    label: "Mudanças regulatórias"
    severity: medio
    score: 15
    keywords: ["nova regulação", "CVM edita", "resolução do CMN", "mudança regulatória", "marco regulatório"]
  - id: indice
    label: "Inclusão/remoção de índice"
    severity: medio
    score: 10
    keywords: ["sai do Ibovespa", "entra no Ibovespa", "sai do índice", "saem do índice", "rebalanceamento do índice", "remoção do índice", "removida do índice", "incluída no índice", "MSCI"]
  - id: pequenas_aquisicoes
    label: "Pequenas aquisições"
    severity: medio
    score: 10
    suppresses: ["ma"]   # se detectado junto com M&A, prevalece o mais específico
    keywords: ["adquire participação", "compra fatia", "aquisição minoritária", "compra participação minoritária"]

  # 🟢 Contexto positivo — aparece no feed e na timeline, mas NÃO pontua risco
  - id: rating_elevado
    label: "Rating elevado"
    severity: info
    positive: true
    score: 0
    keywords: ["eleva rating", "elevação de rating", "upgrade de rating", "eleva nota de crédito", "elevada pela S&P", "elevada pela Moody's", "elevada pela Fitch"]
  - id: outlook_positivo
    label: "Outlook positivo"
    severity: info
    positive: true
    score: 0
    suppresses: ["outlook_negativo"]
    keywords: ["perspectiva positiva", "outlook elevado", "perspectiva elevada", "revisa perspectiva para positiva", "perspectiva para positiva"]
  - id: recomendacao_positiva
    label: "Recomendação elevada"
    severity: info
    positive: true
    score: 0
    keywords: ["eleva recomendação", "eleva preço-alvo", "recomendação de compra", "elevada para compra", "inicia cobertura"]

# ── Scoring semanal (radar) ───────────────────────────────────
scoring:
  attention_threshold: 80
  count_repeated_events: false
  extra_per_article: 5
  extra_cap: 20

# ── Evolução por emissor (radar de longo prazo) ───────────────
# Status:
#   Crítico          → evento com score BRUTO >= critico_event_min_score na
#                      janela (fatos duros como RJ/default não "envelhecem")
#                      OU score acumulado PONDERADO >= critico_total_min
#   Atenção elevada  → score ponderado >= atencao_total_min
#                      OU 2+ tipos de evento negativos distintos
#   Monitorar        → qualquer evento negativo na janela
# Decaimento: o score acumulado usa meia-vida (evento de hoje vale 100%,
# de 30 dias vale 50%, de 60 dias vale 25%) — prioriza deterioração RECENTE.
evolution:
  window_days: 90
  decay:
    enabled: true
    half_life_days: 30
  status:
    critico_event_min_score: 90
    critico_total_min: 140   # calibrado p/ score ponderado: ≈ 2 eventos de severidade crítica recentes
    atencao_total_min: 60

# ── Deduplicação ──────────────────────────────────────────────
# A mesma matéria replicada em vários veículos conta uma vez só.
dedup:
  enabled: true
  similarity: 0.80        # razão de similaridade entre títulos (0-1)

# ── Fatos relevantes da CVM (dados abertos) ───────────────────
# RJ, waiver, renúncia de auditor e troca de CEO saem primeiro em fato
# relevante, antes da imprensa. Fonte: dados.cvm.gov.br (dataset IPE).
cvm_fatos_relevantes:
  enabled: true
  categories: ["Fato Relevante"]
  lookback_days: 7        # janela de protocolos considerada em cada execução

# ── LLM (opcional) ────────────────────────────────────────────
# validate_critical: eventos CRÍTICOS detectados por keyword passam por
# validação do Gemini antes de pontuar — confirma que o evento de fato
# ocorreu (não é especulação, negação ou possibilidade) e é sobre a
# empresa. Falha da API = mantém a classificação por keyword (fail-open).
llm:
  enabled: false
  validate_critical: true
  model: "gemini-2.5-flash-lite"
  gemini_api_key: ""           # ou variável de ambiente GEMINI_API_KEY

# ── Saída ─────────────────────────────────────────────────────
output:
  filename: "dashboard_risco.html"
  history_file: "risk_history.json"
  open_browser: false
