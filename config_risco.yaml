# ── Feeds diretos (RI e outros RSS) ───────────────────────────
# RI DAS EMPRESAS: adicione "ri_feeds" a qualquer emissor da watchlist com a(s)
# URL(s) RSS da página de comunicados do RI. Notícias vindas daí entram com
# confiança "oficial" (peso 1.0) e atribuição forçada à empresa — e chegam
# antes da imprensa. Para achar o feed: página de RI → seção "Comunicados e
# Fatos Relevantes" → ícone RSS (a maioria usa plataformas como MZ que expõem
# RSS). Exemplo:
#   - name: "Suzano"
#     ...
#     ri_feeds:
#       - "https://ri.suzano.com.br/rss/comunicados"
#
# OUTROS FEEDS (ex.: agências de rating): S&P, Moody's e Fitch NÃO oferecem
# RSS público — seus feeds são produtos comerciais. Se a mesa contratar um
# (ou tiver outra fonte RSS confiável), plugue aqui com o tier adequado:
custom_feeds: []
#  - name: "Fitch Ratings — feed contratado"
#    url: "https://exemplo.com/feed-fitch.rss"
#    trust_tier: agencia          # oficial | agencia | imprensa | outros
#    company: ""                  # opcional: força a atribuição a 1 emissor

# ── Scraper de páginas de RI (official.news) ──────────────────
# Estratégias em cascata: 1) RSS anunciado na página (auto-descoberta) →
# 2) âncoras do HTML estático (com data do entorno) → 3) JSON embutido de
# SPAs (__NEXT_DATA__/ld+json) → 4) renderização headless via Playwright
# (Chromium), para sites 100% JavaScript. O passo 4 requer o Playwright
# instalado (o workflow do Actions já instala).
ri_scraper:
  use_browser: true          # habilita o degrau 4 (headless) quando 1-3 falham
  browser_timeout_s: 35
  min_items: 3               # menos que isso → tenta a próxima estratégia
  # Resiliência: se a URL de official.news quebrar ou render pouco (sites de
  # RI mudam de caminho ao trocar de fornecedor — MZ, RIWeb, Ten Meetings…),
  # o crawler volta à home do RI (official.ri) e localiza sozinho a seção
  # cujo caminho contenha um destes termos, nesta ordem de preferência:
  preferred_paths:
    - "fatos-relevantes"
    - "fato-relevante"
    - "comunicados-e-fatos"
    - "comunicados-ao-mercado"
    - "comunicados"
    - "resultados-e-comunicados"
    - "noticias"
    - "avisos"
    - "resultados"

# ── Buscas de mercado (sem empresa específica) ────────────────
market_queries:
  enabled: true
  queries:
    - "recuperação judicial empresa"
    - "pedido de falência empresa"
    - "rebaixamento rating empresa brasileira"
    - "covenant dívida empresa"
    - "CVM suspende negociação"

