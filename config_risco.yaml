# ── Confiança da fonte ────────────────────────────────────────
# Cada notícia recebe um tier de confiança pelo domínio; o peso multiplica
# a contribuição do evento no score. Um fato relevante da CVM vale cheio;
# um site desconhecido vale 60% — RJ oficial ≠ rumor de blog.
source_trust:
  default_tier: outros
  # Ajuste fino POR VEÍCULO: sobrepõe o peso do tier para domínios específicos.
  # Categorias: B agências/wires 0.99 · C econômicos premium 0.95-0.97 ·
  # D financeiros 0.90-0.93 · E generalistas 0.88-0.90
  overrides:
    # B — agências e wires internacionais
    "reuters.com": 0.99
    "bloomberg.com": 0.99
    "bloomberglinea.com.br": 0.99
    # C — econômicos premium
    "valor.globo.com": 0.97
    "pipelinevalor.globo.com": 0.97
    "braziljournal.com": 0.96
    "broadcast.com.br": 0.96
    "neofeed.com.br": 0.95
    # D — financeiros
    "infomoney.com.br": 0.93
    "exame.com": 0.92
    "einvestidor.estadao.com.br": 0.92
    "br.investing.com": 0.91
    "moneytimes.com.br": 0.90
    "clubefii.com.br": 0.90
    # E — generalistas
    "estadao.com.br": 0.90
    "folha.uol.com.br": 0.90
    "oglobo.globo.com": 0.89
    "g1.globo.com": 0.89
    "cnnbrasil.com.br": 0.89
    "economia.uol.com.br": 0.88
  tiers:
    oficial:  { label: "Fonte oficial",       weight: 1.0 }   # CVM, B3, RI
    agencia:  { label: "Agência de rating",   weight: 0.99 }
    imprensa: { label: "Imprensa consolidada", weight: 0.9 }
    outros:   { label: "Fonte não verificada", weight: 0.6 }
  domains:
    oficial:
      - "cvm.gov.br"
      - "sec.gov"
      - "b3.com.br"
      - "fnet.bmfbovespa.com.br"
      - "mzweb.com.br"          # plataformas de RI
      - "ri.pn"
    agencia:
      - "spglobal.com"
      - "moodys.com"
      - "moodyslocal.com"
      - "fitchratings.com"
    imprensa:
      - "broadcast.com.br"
      - "einvestidor.estadao.com.br"
      - "br.investing.com"
      - "economia.uol.com.br"
      - "valor.globo.com"
      - "pipelinevalor.globo.com"
      - "oglobo.globo.com"
      - "g1.globo.com"
      - "infomoney.com.br"
